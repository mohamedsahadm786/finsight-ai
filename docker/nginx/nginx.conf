# ── FinSight AI — Nginx Reverse Proxy Configuration ──────────────
# Handles 5 jobs:
# 1. Reverse proxy: routes /api/* to FastAPI
# 2. Static files: serves React build at /
# 3. WebSocket support: for future real-time features
# 4. Rate limiting: per-IP at the network level
# 5. Security headers: XSS protection, frame options, etc.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip Compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── File Upload Size ─────────────────────────────────
    # Must be large enough for PDF uploads (50MB max)
    client_max_body_size 50M;

    # ── Rate Limiting Zone ───────────────────────────────
    # 10 requests per second per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Upstream: FastAPI Backend ─────────────────────────
    upstream fastapi_backend {
        server fastapi:8000;
    }

    # ── Main Server Block ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security Headers ─────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API Routes → FastAPI ─────────────────────────
        # All /api/* requests are proxied to FastAPI
        # The /api prefix is STRIPPED before forwarding
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://fastapi_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout for long-running requests (document processing status)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── Prometheus Metrics (internal only) ────────────
        # Block external access to /metrics
        location /metrics {
            proxy_pass http://fastapi_backend/metrics;
            # In production, restrict to internal IPs only:
            # allow 10.0.0.0/8;
            # deny all;
        }

        # ── Health Check ──────────────────────────────────
        location /health {
            proxy_pass http://fastapi_backend/health;
        }

        # ── Grafana Dashboard ─────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Flower (Celery Monitoring) ────────────────────
        location /flower/ {
            proxy_pass http://flower:5555/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── React Frontend (Static Files) ─────────────────
        # Serves the compiled React build
        # try_files: serves the file if it exists, otherwise
        # falls back to index.html (for client-side routing)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}