# ── FinSight AI — CI/CD Pipeline ─────────────────────────────────
# Triggers on every push to main branch.
# Job 1: Lint + Test
# Job 2: Build Docker images + Push to Docker Hub
# Job 3: Deploy to EC2 (commented out until Phase 15)

name: FinSight AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  API_IMAGE: mohamedsahadm786/finsight-api
  WORKER_IMAGE: mohamedsahadm786/finsight-worker

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  JOB 1 — LINT + TEST
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finsight_user
          POSTGRES_PASSWORD: testpassword123
          POSTGRES_DB: finsight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finsight_user -d finsight_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.4.4
          python -m spacy download en_core_web_sm

      - name: Lint with ruff
        run: |
          ruff check backend/ --select E,F --ignore E501,E402,F401,F841,F541 --exit-non-zero-on-fix

      - name: Run tests with coverage
        env:
          APP_ENV: testing
          SECRET_KEY: test-secret-key-for-ci-pipeline-only
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: finsight_test
          POSTGRES_USER: finsight_user
          POSTGRES_PASSWORD: testpassword123
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: finsight-documents
          USE_REAL_LLAMA: "false"
          OPENAI_API_KEY: ""
          FRONTEND_URL: http://localhost:5173
        run: |
          pytest --cov=backend --cov-report=term-missing --tb=short -q

  # ═══════════════════════════════════════════════════════════════
  #  JOB 2 — BUILD & PUSH DOCKER IMAGES
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Celery Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  #  JOB 3 — DEPLOY TO EC2 (Uncomment in Phase 15)
