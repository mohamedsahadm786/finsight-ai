apiVersion: v1
kind: ConfigMap
metadata:
  name: finsight-config
  namespace: default
data:
  # Application
  APP_ENV: "production"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  USE_REAL_LLAMA: "false"

  # PostgreSQL
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "finsight"
  POSTGRES_USER: "finsight_user"

  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  # Qdrant
  QDRANT_HOST: "qdrant-service"
  QDRANT_PORT: "6333"

  # MinIO
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_BUCKET: "finsight-documents"

  # Email
  MAIL_SERVER: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_FROM: "noreply@finsight.ai"

  # Frontend
  FRONTEND_URL: "http://localhost"

  # LangSmith (disabled in production)
  LANGCHAIN_TRACING_V2: "false"