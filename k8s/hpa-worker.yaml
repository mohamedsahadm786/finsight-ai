apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: finsight-worker-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: finsight-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 300
  triggers:
    - type: redis
      metadata:
        address: redis-service:6379
        listName: celery
        listLength: "5"
        databaseIndex: "0"