apiVersion: apps/v1
kind: Deployment
metadata:
  name: finsight-nginx
  namespace: default
  labels:
    app: finsight-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finsight-nginx
  template:
    metadata:
      labels:
        app: finsight-nginx
    spec:
      containers:
        - name: finsight-nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10